# English Quest — Full Curriculum Plan (A1 – C1)
#
# This file is the SOURCE OF TRUTH for all learning content.
# Structure: CEFR Level → Sublevel → Module → Lesson → Stages
#
# Stages: vocabulary | grammar | reading | listening | speaking | writing | boss
# Speaking & Writing stages have is_active: false by default (future AI check).

curriculum:
  - code: A1
    title: "A1 — Beginner"
    description: "Основы: знакомство, числа, семья, ежедневная жизнь, простые действия."
    order: 1
    is_active: true
    sublevels:
      - code: A1.1
        title: "A1.1 — Starter"
        description: "Zero to basic communication."
        order: 1
        is_active: true
        modules:
          - title: "Hello & Goodbye"
            description: "Знакомство, приветствия, алфавит, глагол to be."
            order: 1
            difficulty: 1
            estimated_minutes: 45
            xp_reward: 200
            is_active: true
            lessons:
              - title: "Greetings & Introductions"
                order: 1
                xp_reward: 50
                is_active: true
                stages:
                  - type: vocabulary
                    title: "Hello Words"
                    order: 1
                    is_active: true
                    content:
                      prompt: "Basic greetings and introductions"
                      words:
                        - word: "hello"
                          translation: "привет"
                          example: "Hello, how are you?"
                        - word: "goodbye"
                          translation: "до свидания"
                          example: "Goodbye, see you later."
                        - word: "hi"
                          translation: "привет"
                          example: "Hi, my name is John."
                        - word: "bye"
                          translation: "пока"
                          example: "Bye, see you tomorrow."
                        - word: "name"
                          translation: "имя"
                          example: "My name is Anna."
                        - word: "friend"
                          translation: "друг"
                          example: "She is my friend."
                        - word: "please"
                          translation: "пожалуйста"
                          example: "Please sit down."
                        - word: "thanks"
                          translation: "спасибо"
                          example: "Thanks for the help."
                  - type: grammar
                    title: "Verb to be — am/is/are"
                    order: 2
                    is_active: true
                    content:
                      prompt: "Positive and negative forms of to be"
                      rules:
                        - "I am (I'm) — I am a student."
                        - "He/She/It is (He's) — She is a teacher."
                        - "You/We/They are (You're) — They are friends."
                      exercises:
                        - "I ___ a student. (am)"
                        - "She ___ a doctor. (is)"
                        - "They ___ from France. (are)"
                  - type: reading
                    title: "Meet My Friends"
                    order: 3
                    is_active: true
                    content:
                      text: "Hi! I am Tom. I am from the USA. This is my friend Anna. She is from Canada. We are students. We are happy to meet you!"
                      questions:
                        - "What is his name? (Tom)"
                        - "Where is Tom from? (the USA)"
                        - "Is Anna from the USA? (No, she is from Canada.)"
                  - type: listening
                    title: "Listen & Choose"
                    order: 4
                    is_active: true
                    content:
                      audio_prompt: "Basic introductions dialog"
                      script: "A: Hello, I'm Mike. B: Hi Mike, I'm Sarah. A: Nice to meet you, Sarah. B: Nice to meet you too!"
                      questions:
                        - "What is the first person's name? (Mike)"
                        - "What is the second person's name? (Sarah)"
                  - type: speaking
                    title: "Introduce Yourself"
                    order: 5
                    is_active: false
                    content:
                      prompt: "Say your name, where you are from, and your occupation."
                  - type: writing
                    title: "Write About You"
                    order: 6
                    is_active: false
                    content:
                      prompt: "Write 3 sentences about yourself using to be."
                  - type: boss
                    title: "Introduction Boss"
                    order: 7
                    is_active: true
                    content:
                      prompt: "Mix of vocabulary, grammar, and comprehension."
                      stages_covered: [1, 2, 3, 4]

              - title: "The Alphabet & Spelling"
                order: 2
                xp_reward: 45
                is_active: true
                stages:
                  - type: vocabulary
                    title: "Alphabet Letters"
                    order: 1
                    is_active: true
                    content:
                      prompt: "Letters A-Z with example words"
                      words:
                        - word: "apple"
                          translation: "яблоко"
                        - word: "book"
                          translation: "книга"
                        - word: "cat"
                          translation: "кот"
                        - word: "dog"
                          translation: "собака"
                        - word: "egg"
                          translation: "яйцо"
                        - word: "fish"
                          translation: "рыба"
                  - type: grammar
                    title: "Questions with to be"
                    order: 2
                    is_active: true
                    content:
                      prompt: "Question forms: Am I? Is he? Are you?"
                      rules:
                        - "Am I...? — Am I late?"
                        - "Is he/she/it...? — Is she a teacher?"
                        - "Are you/we/they...? — Are you from Spain?"
                      exercises:
                        - "___ you a student? (Are)"
                        - "___ she your sister? (Is)"
                        - "___ they at home? (Are)"
                  - type: reading
                    title: "The Alphabet Song"
                    order: 3
                    is_active: true
                    content:
                      text: "A is for apple. B is for book. C is for cat. D is for dog. E is for egg. F is for fish. The alphabet is fun!"
                      questions:
                        - "What is B for? (book)"
                        - "Is the alphabet fun? (Yes, it is.)"
                  - type: listening
                    title: "Spell the Name"
                    order: 4
                    is_active: true
                    content:
                      audio_prompt: "A person spells their name."
                      script: "My name is Kate. K-A-T-E."
                      questions:
                        - "How do you spell Kate? (K-A-T-E)"
                  - type: boss
                    title: "Alphabet Boss"
                    order: 5
                    is_active: true
                    content:
                      prompt: "Spelling and to be questions mix."
                      stages_covered: [1, 2, 3, 4]

              - title: "Numbers 1–20 & Age"
                order: 3
                xp_reward: 50
                is_active: true
                stages:
                  - type: vocabulary
                    title: "Numbers 1–20"
                    order: 1
                    is_active: true
                    content:
                      prompt: "Numbers from one to twenty"
                      words:
                        - word: "one"
                          translation: "один"
                        - word: "two"
                          translation: "два"
                        - word: "three"
                          translation: "три"
                        - word: "four"
                          translation: "четыре"
                        - word: "five"
                          translation: "пять"
                        - word: "six"
                          translation: "шесть"
                        - word: "seven"
                          translation: "семь"
                        - word: "eight"
                          translation: "восемь"
                        - word: "nine"
                          translation: "девять"
                        - word: "ten"
                          translation: "десять"
                  - type: grammar
                    title: "How old are you?"
                    order: 2
                    is_active: true
                    content:
                      prompt: "Questions about age with to be"
                      rules:
                        - "How old are you? — I am 25 years old."
                        - "How old is he? — He is 30 years old."
                      exercises:
                        - "How old ___ you? (are)"
                        - "I ___ 20 years old. (am)"
                  - type: reading
                    title: "Ages"
                    order: 3
                    is_active: true
                    content:
                      text: "Tom is 10 years old. Anna is 8 years old. Mike is 12 years old. They are students."
                      questions:
                        - "How old is Tom? (10 years old)"
                        - "Is Mike 8 years old? (No, he is 12 years old.)"
                  - type: listening
                    title: "Listen to Ages"
                    order: 4
                    is_active: true
                    content:
                      audio_prompt: "People saying their age."
                      script: "Hi, I am Lisa. I am 22. This is my brother Ben. He is 18."
                      questions:
                        - "How old is Lisa? (22)"
                        - "How old is Ben? (18)"
                  - type: boss
                    title: "Numbers Boss"
                    order: 5
                    is_active: true
                    content:
                      prompt: "Numbers and age questions mix."
                      stages_covered: [1, 2, 3, 4]

              - title: "Countries & Nationalities"
                order: 4
                xp_reward: 55
                is_active: true
                stages:
                  - type: vocabulary
                    title: "Countries"
                    order: 1
                    is_active: true
                    content:
                      prompt: "Country names and nationalities"
                      words:
                        - word: "the USA"
                          translation: "США"
                          example: "I am from the USA."
                        - word: "Canada"
                          translation: "Канада"
                          example: "She is from Canada."
                        - word: "the UK"
                          translation: "Великобритания"
                          example: "He is from the UK."
                        - word: "American"
                          translation: "американский"
                          example: "I am American."
                        - word: "Canadian"
                          translation: "канадский"
                          example: "She is Canadian."
                        - word: "British"
                          translation: "британский"
                          example: "He is British."
                  - type: grammar
                    title: "to be — negative"
                    order: 2
                    is_active: true
                    content:
                      prompt: "Negative forms: am not, is not, are not"
                      rules:
                        - "I am not (I'm not) — I am not from Spain."
                        - "He/She/It is not (isn't) — She isn't a doctor."
                        - "You/We/They are not (aren't) — They aren't students."
                      exercises:
                        - "She ___ from Italy. (isn't)"
                        - "We ___ teachers. (aren't)"
                  - type: reading
                    title: "Where Are They From?"
                    order: 3
                    is_active: true
                    content:
                      text: "Maria is from Spain. She is Spanish. Pierre is from France. He is French. They are not from the same country."
                      questions:
                        - "Where is Maria from? (Spain)"
                        - "Is Pierre Spanish? (No, he is French.)"
                  - type: listening
                    title: "Country Match"
                    order: 4
                    is_active: true
                    content:
                      audio_prompt: "People saying their nationality."
                      script: "I am Carlos. I am from Mexico. I am Mexican."
                      questions:
                        - "Where is Carlos from? (Mexico)"
                  - type: boss
                    title: "Countries Boss"
                    order: 5
                    is_active: true
                    content:
                      prompt: "Countries, nationalities, and to be negative."
                      stages_covered: [1, 2, 3, 4]

          - title: "Numbers & World"
            description: "Числа, цвета, предметы, артикли."
            order: 2
            difficulty: 1
            estimated_minutes: 50
            xp_reward: 220
            is_active: true
            lessons:
              - title: "Colors & Descriptions"
                order: 1
                xp_reward: 50
                is_active: true
                stages:
                  - type: vocabulary
                    title: "Colors"
                    order: 1
                    is_active: true
                    content:
                      prompt: "Basic colors"
                      words:
                        - word: "red"
                          translation: "красный"
                          example: "The apple is red."
                        - word: "blue"
                          translation: "синий"
                          example: "The sky is blue."
                        - word: "green"
                          translation: "зеленый"
                          example: "The tree is green."
                        - word: "yellow"
                          translation: "желтый"
                          example: "The sun is yellow."
                        - word: "black"
                          translation: "черный"
                          example: "My bag is black."
                        - word: "white"
                          translation: "белый"
                          example: "The snow is white."
                  - type: grammar
                    title: "Articles a/an"
                    order: 2
                    is_active: true
                    content:
                      prompt: "a vs an based on the following sound"
                      rules:
                        - "Use 'a' before consonant sounds: a book, a dog"
                        - "Use 'an' before vowel sounds: an apple, an egg"
                      exercises:
                        - "___ cat (a)"
                        - "___ elephant (an)"
                        - "___ orange (an)"
                        - "___ student (a)"
                  - type: reading
                    title: "Colorful World"
                    order: 3
                    is_active: true
                    content:
                      text: "I have a red pen and a blue book. She has an orange bag and a yellow pencil. The classroom is colorful!"
                      questions:
                        - "What color is the pen? (red)"
                        - "Does she have a blue bag? (No, she has an orange bag.)"
                  - type: listening
                    title: "What Color Is It?"
                    order: 4
                    is_active: true
                    content:
                      audio_prompt: "Describing objects by color."
                      script: "My car is red. My friend's car is blue."
                      questions:
                        - "What color is my car? (red)"
                  - type: boss
                    title: "Colors Boss"
                    order: 5
                    is_active: true
                    content:
                      prompt: "Colors and articles a/an."
                      stages_covered: [1, 2, 3, 4]

              - title: "Plural Nouns"
                order: 2
                xp_reward: 50
                is_active: true
                stages:
                  - type: vocabulary
                    title: "Classroom Objects"
                    order: 1
                    is_active: true
                    content:
                      prompt: "Common classroom items"
                      words:
                        - word: "pen"
                          translation: "ручка"
                        - word: "pencil"
                          translation: "карандаш"
                        - word: "book"
                          translation: "книга"
                        - word: "desk"
                          translation: "парта"
                        - word: "chair"
                          translation: "стул"
                        - word: "bag"
                          translation: "сумка"
                        - word: "table"
                          translation: "стол"
                        - word: "door"
                          translation: "дверь"
                  - type: grammar
                    title: "Plural: -s / -es"
                    order: 2
                    is_active: true
                    content:
                      prompt: "Regular plural forms"
                      rules:
                        - "Add -s: book → books, pen → pens"
                        - "Add -es after s, sh, ch, x, o: box → boxes, bus → buses"
                        - "Irregular: child → children, man → men, woman → women"
                      exercises:
                        - "one cat, two ___ (cats)"
                        - "one box, three ___ (boxes)"
                        - "one child, five ___ (children)"
                  - type: reading
                    title: "In the Classroom"
                    order: 3
                    is_active: true
                    content:
                      text: "The classroom has four desks and ten chairs. There are three books on the table. Two pens are on the desk."
                      questions:
                        - "How many desks are there? (four)"
                        - "Where are the pens? (on the desk)"
                  - type: listening
                    title: "Count the Objects"
                    order: 4
                    is_active: true
                    content:
                      audio_prompt: "Counting classroom items."
                      script: "There are five books, three pens, and two bags."
                      questions:
                        - "How many books? (five)"
                        - "How many bags? (two)"
                  - type: boss
                    title: "Plurals Boss"
                    order: 5
                    is_active: true
                    content:
                      prompt: "Vocabulary and plural forms."
                      stages_covered: [1, 2, 3, 4]

              - title: "Numbers 20–100 & Prices"
                order: 3
                xp_reward: 55
                is_active: true
                stages:
                  - type: vocabulary
                    title: "Numbers 20–100"
                    order: 1
                    is_active: true
                    content:
                      prompt: "Numbers twenty through one hundred"
                      words:
                        - word: "twenty"
                          translation: "двадцать"
                        - word: "thirty"
                          translation: "тридцать"
                        - word: "forty"
                          translation: "сорок"
                        - word: "fifty"
                          translation: "пятьдесят"
                        - word: "sixty"
                          translation: "шестьдесят"
                        - word: "seventy"
                          translation: "семьдесят"
                        - word: "eighty"
                          translation: "восемьдесят"
                        - word: "ninety"
                          translation: "девяносто"
                        - word: "one hundred"
                          translation: "сто"
                  - type: grammar
                    title: "this / that / these / those"
                    order: 2
                    is_active: true
                    content:
                      prompt: "Demonstratives for near vs far, singular vs plural"
                      rules:
                        - "this (near, singular) — This book is mine."
                        - "that (far, singular) — That car is red."
                        - "these (near, plural) — These pens are new."
                        - "those (far, plural) — Those houses are big."
                      exercises:
                        - "___ is my pen (near). (This)"
                        - "___ are my books (near). (These)"
                        - "___ is a car (far). (That)"
                  - type: reading
                    title: "At the Store"
                    order: 3
                    is_active: true
                    content:
                      text: "This pen costs $2. That notebook is $5. These pencils are $1 each. How much is this bag? It is $30."
                      questions:
                        - "How much is the pen? ($2)"
                        - "How much is the notebook? ($5)"
                        - "How much is the bag? ($30)"
                  - type: listening
                    title: "Listen to Prices"
                    order: 4
                    is_active: true
                    content:
                      audio_prompt: "Store items with prices."
                      script: "The red T-shirt is $25. The blue jeans are $45. The black shoes are $60."
                      questions:
                        - "How much is the T-shirt? ($25)"
                        - "How much are the shoes? ($60)"
                  - type: boss
                    title: "Numbers Boss 2"
                    order: 5
                    is_active: true
                    content:
                      prompt: "Numbers, prices, this/that/these/those."
                      stages_covered: [1, 2, 3, 4]

              - title: "Basic Adjectives"
                order: 4
                xp_reward: 50
                is_active: true
                stages:
                  - type: vocabulary
                    title: "Simple Adjectives"
                    order: 1
                    is_active: true
                    content:
                      prompt: "Common descriptive words"
                      words:
                        - word: "big"
                          translation: "большой"
                        - word: "small"
                          translation: "маленький"
                        - word: "old"
                          translation: "старый"
                        - word: "new"
                          translation: "новый"
                        - word: "good"
                          translation: "хороший"
                        - word: "bad"
                          translation: "плохой"
                        - word: "beautiful"
                          translation: "красивый"
                        - word: "ugly"
                          translation: "уродливый"
                  - type: grammar
                    title: "Adjective + Noun word order"
                    order: 2
                    is_active: true
                    content:
                      prompt: "Adjectives go before nouns in English"
                      rules:
                        - "Adjective comes BEFORE the noun: a big house, a small cat"
                        - "NOT: a house big"
                      exercises:
                        - "a ___ car (new)"
                        - "a ___ book (good)"
                        - "an ___ woman (old)"
                  - type: reading
                    title: "Describe My Room"
                    order: 3
                    is_active: true
                    content:
                      text: "My room is big. There is a new bed and an old desk. The window is big and beautiful. I have a small cat."
                      questions:
                        - "Is the room small? (No, it is big.)"
                        - "What color is the bed? (Not mentioned)"
                  - type: listening
                    title: "How Does It Look?"
                    order: 4
                    is_active: true
                    content:
                      audio_prompt: "Describing items."
                      script: "I have a new phone. It is small and beautiful."
                      questions:
                        - "Is the phone new? (Yes)"
                        - "Is the phone big? (No, it is small.)"
                  - type: boss
                    title: "Adjectives Boss"
                    order: 5
                    is_active: true
                    content:
                      prompt: "Adjective order and vocabulary."
                      stages_covered: [1, 2, 3, 4]

          - title: "My Family & Home"
            description: "Семья, дом, there is/are, предлоги места."
            order: 3
            difficulty: 2
            estimated_minutes: 55
            xp_reward: 240
            is_active: true
            lessons:
              - title: "Family Members"
                order: 1
                xp_reward: 50
                is_active: true
                stages:
                  - type: vocabulary
                    title: "Family Words"
                    order: 1
                    is_active: true
                    content:
                      prompt: "Family member vocabulary"
                      words:
                        - word: "mother"
                          translation: "мама"
                          example: "My mother is a teacher."
                        - word: "father"
                          translation: "папа"
                          example: "My father is a doctor."
                        - word: "sister"
                          translation: "сестра"
                          example: "I have one sister."
                        - word: "brother"
                          translation: "брат"
                          example: "My brother is 10."
                        - word: "grandmother"
                          translation: "бабушка"
                        - word: "grandfather"
                          translation: "дедушка"
                        - word: "aunt"
                          translation: "тетя"
                        - word: "uncle"
                          translation: "дядя"
                        - word: "cousin"
                          translation: "двоюродный брат/сестра"
                  - type: grammar
                    title: "Possessive 's"
                    order: 2
                    is_active: true
                    content:
                      prompt: "Showing ownership with 's"
                      rules:
                        - "Add 's to a person: Tom's book, Anna's cat"
                        - "For plural ending in s, add just ': my parents' car"
                      exercises:
                        - "This is ___ book. (Tom → Tom's)"
                        - "That is ___ cat. (my sister → my sister's)"
                        - "___ house is big. (My parents → My parents')"
                  - type: reading
                    title: "My Family"
                    order: 3
                    is_active: true
                    content:
                      text: "This is my family. My mother's name is Anna. My father's name is Mark. I have one sister. Her name is Lisa. My grandmother's house is near our house. She is 70 years old."
                      questions:
                        - "What is my mother's name? (Anna)"
                        - "Do I have a brother? (No, I have a sister.)"
                        - "How old is grandmother? (70 years old)"
                  - type: listening
                    title: "Family Description"
                    order: 4
                    is_active: true
                    content:
                      audio_prompt: "Person describing family."
                      script: "I have a big family. My brother's name is Alex. My sister's name is Emma. My parents are teachers."
                      questions:
                        - "What is my brother's name? (Alex)"
                        - "What do my parents do? (They are teachers.)"
                  - type: boss
                    title: "Family Boss"
                    order: 5
                    is_active: true
                    content:
                      prompt: "Family vocabulary and possessive 's."
                      stages_covered: [1, 2, 3, 4]

              - title: "Rooms & Furniture"
                order: 2
                xp_reward: 50
                is_active: true
                stages:
                  - type: vocabulary
                    title: "House & Rooms"
                    order: 1
                    is_active: true
                    content:
                      prompt: "Parts of a house and furniture"
                      words:
                        - word: "kitchen"
                          translation: "кухня"
                        - word: "bedroom"
                          translation: "спальня"
                        - word: "bathroom"
                          translation: "ванная"
                        - word: "living room"
                          translation: "гостиная"
                        - word: "dining room"
                          translation: "столовая"
                        - word: "bed"
                          translation: "кровать"
                        - word: "table"
                          translation: "стол"
                        - word: "chair"
                          translation: "стул"
                        - word: "sofa"
                          translation: "диван"
                        - word: "fridge"
                          translation: "холодильник"
                  - type: grammar
                    title: "There is / There are"
                    order: 2
                    is_active: true
                    content:
                      prompt: "Existential there + to be"
                      rules:
                        - "There is + singular: There is a bed in the room."
                        - "There are + plural: There are two chairs."
                        - "There isn't / There aren't for negative"
                      exercises:
                        - "___ a big window in the kitchen. (There is)"
                        - "___ three books on the table. (There are)"
                        - "___ a cat under the table? (Is there)"
                  - type: reading
                    title: "My Dream House"
                    order: 3
                    is_active: true
                    content:
                      text: "My dream house has a big living room. There is a new sofa and a big TV. There are three bedrooms. The kitchen is small but beautiful. There is a garden behind the house."
                      questions:
                        - "How many bedrooms are there? (three)"
                        - "Is the kitchen big? (No, it is small.)"
                        - "Is there a garden? (Yes, there is.)"
                  - type: listening
                    title: "House Tour"
                    order: 4
                    is_active: true
                    content:
                      audio_prompt: "House description."
                      script: "Welcome to my house. There is a living room, a kitchen, and two bedrooms. The bathroom is next to the bedrooms."
                      questions:
                        - "How many bedrooms? (two)"
                        - "Where is the bathroom? (next to the bedrooms)"
                  - type: boss
                    title: "House Boss"
                    order: 5
                    is_active: true
                    content:
                      prompt: "House vocabulary and there is/are."
                      stages_covered: [1, 2, 3, 4]

              - title: "Prepositions of Place"
                order: 3
                xp_reward: 55
                is_active: true
                stages:
                  - type: vocabulary
                    title: "Location Words"
                    order: 1
                    is_active: true
                    content:
                      prompt: "Prepositions of place"
                      words:
                        - word: "in"
                          translation: "в"
                          example: "The pen is in the bag."
                        - word: "on"
                          translation: "на"
                          example: "The book is on the table."
                        - word: "under"
                          translation: "под"
                          example: "The cat is under the chair."
                        - word: "next to"
