  - code: B1
    title: "B1 — Intermediate"
    description: "Связная речь, обсуждение идей, мнения, гипотезы."
    order: 3
    is_active: false
    sublevels:
      - code: B1.1
        title: "B1.1 — Lower Intermediate"
        description: "Продолженные времена, условные предложения, косвенная речь."
        order: 1
        is_active: false
        modules:
          - title: "Past Continuous & Narrative"
            description: "Описание событий в прошлом, рассказы."
            order: 1
            difficulty: 3
            estimated_minutes: 70
            xp_reward: 320
            is_active: false
            lessons:
              - title: "Past Continuous"
                order: 1
                xp_reward: 60
                is_active: true
                stages:
                  - type: vocabulary
                    title: "Narrative Words"
                    order: 1
                    is_active: true
                    content:
                      prompt: "Words for storytelling"
                      words:
                        - word: "while"
                          translation: "в то время как"
                        - word: "when"
                          translation: "когда"
                        - word: "suddenly"
                          translation: "внезапно"
                        - word: "meanwhile"
                          translation: "тем временем"
                        - word: "eventually"
                          translation: "в конце концов"
                        - word: "after that"
                          translation: "после этого"
                  - type: grammar
                    title: "Past Continuous (was/were + -ing)"
                    order: 2
                    is_active: true
                    content:
                      prompt: "Action in progress in the past"
                      rules:
                        - "was/were + -ing: I was reading when she called."
                        - "Interrupted action: I was watching TV when the power went out."
                        - "Two parallel actions: I was cooking while she was cleaning."
                      exercises:
                        - "I ___ (read) when he arrived. (was reading)"
                        - "While I ___ (walk) home, it started to rain. (was walking)"
                        - "They ___ (not/listen) when I explained. (weren't listening)"
                  - type: reading
                    title: "A Strange Night"
                    order: 3
                    is_active: true
                    content:
                      text: "At 11 PM, I was reading a book in bed. Suddenly, I heard a noise. I was getting up to check when the lights went out. My brother was sleeping, so I didn't want to wake him. While I was looking for my phone, I heard the noise again."
                      questions:
                        - "What was I doing at 11 PM? (reading a book)"
                        - "What happened while I was getting up? (the lights went out)"
                        - "Why didn't I wake my brother? (he was sleeping)"
                  - type: listening
                    title: "What Was Happening?"
                    order: 4
                    is_active: true
                    content:
                      audio_prompt: "Describing past events."
                      script: "Yesterday around 6 PM, I was driving home from work. While I was waiting at a traffic light, I saw a car accident. I was calling 911 when the ambulance arrived."
                      questions:
                        - "What was I doing at 6 PM? (driving home)"
                        - "What did I see at the traffic light? (a car accident)"
                  - type: boss
                    title: "Past Continuous Boss"
                    order: 5
                    is_active: true
                    content:
                      prompt: "Past Continuous, interrupted actions, narrative."
                      stages_covered: [1, 2, 3, 4]

              - title: "Past Perfect"
                order: 2
                xp_reward: 65
                is_active: true
                stages:
                  - type: vocabulary
                    title: "Sequence Words"
                    order: 1
                    is_active: true
                    content:
                      prompt: "Showing order of events"
                      words:
                        - word: "already"
                          translation: "уже"
                        - word: "never...before"
                          translation: "никогда раньше"
                        - word: "by the time"
                          translation: "к тому времени как"
                        - word: "after"
                          translation: "после"
                        - word: "before"
                          translation: "до"
                  - type: grammar
                    title: "Past Perfect (had + past participle)"
                    order: 2
                    is_active: true
                    content:
                      prompt: "Action completed before another past action"
                      rules:
                        - "had + past participle: I had finished dinner when she arrived."
                        - "By the time + past: By the time we arrived, the movie had started."
                        - "After/before: After I had eaten, I went to bed."
                      exercises:
                        - "By the time I got there, she ___ (leave). (had left)"
                        - "I ___ (never/see) such a beautiful place before. (had never seen)"
                        - "After he ___ (finish) work, he went home. (had finished)"
                  - type: reading
                    title: "A Terrible Morning"
                    order: 3
                    is_active: true
                    content:
                      text: "By the time I woke up, my alarm had already rung an hour ago. I had forgotten to set it. When I finally got to the kitchen, my toast had burned. After I had rushed to the bus stop, the bus had already left. I had never had such a bad morning before."
                      questions:
                        - "What had happened by the time I woke up? (the alarm had rung an hour ago)"
                        - "Why did the toast burn? (I had forgotten about it)"
                        - "Had the bus left when I arrived? (Yes, it had.)"
                  - type: listening
                    title: "Before and After"
                    order: 4
                    is_active: true
                    content:
                      audio_prompt: "Story with past perfect."
                      script: "When I arrived at the airport, I realized I had left my passport at home. I had checked my bags before I remembered. By the time my friend brought it, I had missed my flight."
                      questions:
                        - "What had I left at home? (my passport)"
                        - "What had happened by the time my friend arrived? (I had missed my flight)"
                  - type: boss
                    title: "Past Perfect Boss"
                    order: 5
                    is_active: true
                    content:
                      prompt: "Past Perfect, narrative sequence, by the time."
                      stages_covered: [1, 2, 3, 4]

              - title: "First Conditional"
                order: 3
                xp_reward: 60
                is_active: true
                stages:
                  - type: grammar
                    title: "If + Present Simple, will + verb"
                    order: 1
                    is_active: true
                    content:
                      prompt: "Real/possible future conditions"
                      rules:
                        - "If + present simple, will + base: If it rains, I will stay home."
                        - "Comma if if-clause comes first: If you study, you will pass."
                        - "No comma if main clause first: You will pass if you study."
                        - "Unless = if not: Unless you hurry, you will be late."
                      exercises:
                        - "If it ___ (rain), I ___ (stay) home. (rains, will stay)"
                        - "We ___ (go) to the beach if it ___ (be) sunny. (will go, is)"
                        - "Unless you ___ (study), you ___ (not/pass). (study, won't pass)"
                  - type: reading
                    title: "Planning Ahead"
                    order: 2
                    is_active: true
                    content:
                      text: "If the weather is nice tomorrow, we will go to the park. If it rains, we will visit a museum. If we go to the park, I will bring a picnic. My friend will come if he finishes his work."
                      questions:
                        - "What will happen if the weather is nice? (we will go to the park)"
                        - "What will happen if it rains? (we will visit a museum)"
                        - "When will my friend come? (if he finishes his work)"
                  - type: listening
                    title: "If This Happens..."
                    order: 3
                    is_active: true
                    content:
                      audio_prompt: "Discussing possibilities."
                      script: "If I get the job, I will move to Chicago. I will find an apartment if the salary is good. If I don't like it, I will come back."
                      questions:
                        - "What will happen if they get the job? (move to Chicago)"
                        - "What will they do if the salary is good? (find an apartment)"
                  - type: boss
                    title: "First Conditional Boss"
                    order: 4
                    is_active: true
                    content:
                      prompt: "First conditional, unless."
                      stages_covered: [1, 2, 3, 4]

      - code: B1.2
        title: "B1.2 — Upper Intermediate"
        description: "Условные 2-го типа, пассив, косвенная речь."
        order: 2
        is_active: false
        modules:
          - title: "Second Conditional & Hypotheticals"
            description: "Гипотетические ситуации, советы, пожелания."
            order: 1
            difficulty: 4
            estimated_minutes: 75
            xp_reward: 350
            is_active: false
            lessons:
              - title: "Second Conditional"
                order: 1
                xp_reward: 65
                is_active: true
                stages:
                  - type: grammar
                    title: "If + Past Simple, would + verb"
                    order: 1
                    is_active: true
                    content:
                      prompt: "Unreal/hypothetical present conditions"
                      rules:
                        - "If + past simple, would + base: If I had money, I would travel."
                        - "Were for all subjects: If I were you, I would accept."
                        - "Could/might: If I studied more, I could pass."
                      exercises:
                        - "If I ___ (have) a car, I ___ (drive) to work. (had, would drive)"
                        - "If she ___ (be) taller, she ___ (can) play basketball. (were, could)"
                        - "What ___ you ___ (do) if you won the lottery? (would, do)"
                  - type: reading
                    title: "Dreams and Wishes"
                    order: 2
                    is_active: true
                    content:
                      text: "If I had a million dollars, I would buy a house by the beach. I would travel around the world. If I could speak five languages, I would work as a translator. If I were more confident, I would start my own business."
                      questions:
                        - "What would I do if I had a million dollars? (buy a house, travel)"
                        - "What would I do if I could speak five languages? (work as a translator)"
                        - "What would I do if I were more confident? (start a business)"
                  - type: listening
                    title: "What If...?"
                    order: 3
                    is_active: true
                    content:
                      audio_prompt: "Dreams and hypotheticals."
                      script: "If I lived in London, I would visit all the museums. I would go to concerts every week. I would learn British English."
                      questions:
                        - "Where would the person live? (London)"
                        - "What would they visit? (all the museums)"
                  - type: boss
                    title: "Second Conditional Boss"
                    order: 4
                    is_active: true
                    content:
                      prompt: "Second conditional, wishes, hypotheticals."
                      stages_covered: [1, 2, 3, 4]

              - title: "Passive Voice (Present & Past)"
                order: 2
                xp_reward: 70
                is_active: true
                stages:
                  - type: grammar
                    title: "am/is/are + past participle / was/were + pp"
                    order: 1
                    is_active: true
                    content:
                      prompt: "When the action is more important than who does it"
                      rules:
                        - "Present passive: am/is/are + pp: English is spoken worldwide."
                        - "Past passive: was/were + pp: The book was written in 1990."
                        - "By + agent: The cake was made by my mother."
                      exercises:
                        - "Coffee ___ (grow) in Brazil. (is grown)"
                        - "The window ___ (break) last night. (was broken)"
                        - "Rome ___ (not/build) in a day. (wasn't built)"
                  - type: reading
                    title: "How Things Are Made"
                    order: 2
                    is_active: true
                    content:
                      text: "Chocolate is made from cocoa beans. The beans are grown in tropical countries. They are harvested by farmers. Then the beans are roasted and ground. Finally, sugar and milk are added. The first chocolate bar was made in 1847."
                      questions:
                        - "What is chocolate made from? (cocoa beans)"
                        - "Where are cocoa beans grown? (tropical countries)"
                        - "When was the first chocolate bar made? (1847)"
                  - type: listening
                    title: "Famous Places"
                    order: 3
                    is_active: true
                    content:
                      audio_prompt: "Describing landmarks in passive."
                      script: "The Eiffel Tower was built in 1889. It was designed by Gustave Eiffel. It is visited by millions of tourists every year."
                      questions:
                        - "When was the Eiffel Tower built? (1889)"
                        - "Who designed it? (Gustave Eiffel)"
                  - type: boss
                    title: "Passive Boss"
                    order: 4
                    is_active: true
                    content:
                      prompt: "Present and Past Passive."
                      stages_covered: [1, 2, 3, 4]

              - title: "Reported Speech"
                order: 3
                xp_reward: 70
                is_active: true
                stages:
                  - type: grammar
                    title: "Said / told + backshift"
                    order: 1
                    is_active: true
                    content:
                      prompt: "Reporting what someone said"
                      rules:
                        - "said (that): He said (that) he was tired."
                        - "told someone (that): She told me (that) she was happy."
                        - "Tense backshift: present → past, past → past perfect"
                        - "Pronoun change: I → he/she, my → his/her"
                      exercises:
                        - "\"I am hungry\" → He said he ___ hungry. (was)"
                        - "\"I have finished\" → She said she ___ finished. (had)"
                        - "\"We will come\" → They said they ___ come. (would)"

