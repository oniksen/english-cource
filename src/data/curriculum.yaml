                      rules:
                        - "If + past perfect, would have + pp: If I had studied, I would have passed."
                        - "Could have / might have: I could have been a doctor."
                      exercises:
                        - "If I ___ (know), I ___ (come). (had known, would have come)"
                        - "She ___ (not/miss) the train if she ___ (leave) earlier. (wouldn't have missed, had left)"

            # ... (B2 and C1 follow same pattern — see full file for detail)

